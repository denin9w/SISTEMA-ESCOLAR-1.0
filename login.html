<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="login.css">

    <title> Projeto Ceje 1.0 </title>

</head>

<body>
    <header>
        <h1>Centro Educacional Jardin do Éden</h1>
        <h2>Uma escola de Gerações</h2>
    </header>


    <section class="title-l">


        <div class="elementos moeda">
            <img src="images/moeda.png" alt="moeda">
        </div>

        <div class="elementos boneco1">
            <img src="images/boneco1.png" alt="raio" >
        </div>

        <div class="loginh1">
            <h1>Faça login</h1>
        </div>

        <div class="tabs">

            <button   class="tab active" data-tipo="responsavel">
                <p>Responsável</p>
            </button>

            <button  class="tab" data-tipo="professor">
                <p>Professor</p>
            </button>

            <button  class="tab" data-tipo="gestor">
                <p>Gestor</p>
            </button>

        </div>


        <div class="login">
            <div id="loginForm">
                <div class="input-one">
                    <label for="usuario">CPF</label>
                    <input
                        class="input-l"
                        type="text"
                        id="usuario"
                        
                    >
                </div>
                <div class="input-two">
                    <label for="senha">Senha</label>
                    <input
                        class="input-l"
                        type="password"
                        id="senha"
                        
                    >
                </div>

                <button
                    class="input-b" 
                    type="submit">
                    Entrar
                </button>

                <a href="ex001.html">Clica aqui para voltar a página inicial</a>
                
            </div>
        </div>

    </section>

    <footer >
    <p>CENTRO EDUCACIONAL JARDIM DO ÉDEN</p>
    </footer>

<script src="script.js"></script>
</body>

</html>
